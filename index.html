<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>脚数計算</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f0f8f5; color: #333; }
    .status-bar { font-size: 12px; color: #44a696; margin-bottom: 15px; font-weight: bold; }
    .line { margin-bottom: 15px; display: flex; align-items: center; }
    input[type="number"] { width: 100px; padding: 5px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
    span { margin-left: 10px; font-weight: bold; color: #444; }
    .result-box { margin-top: 20px; padding: 15px; background: white; border-radius: 10px; border: 1px solid #88c9bf; }
    
    /* チェックボックスのスタイル */
    .check-section { margin-top: 25px; padding-top: 15px; border-top: 2px dashed #88c9bf; }
    .check-line { margin-bottom: 12px; font-size: 16px; cursor: pointer; display: flex; align-items: center; }
    input[type="checkbox"] { width: 20px; height: 20px; margin-right: 10px; cursor: pointer; accent-color: #44a696; }
  </style>
</head>
<body>

  <h2>🌱 脚数計算 </h2>
  <div id="status" class="status-bar">クラウド同期：接続中...</div>

  <div class="line">A1ライン: <input type="number" id="A1"> → <span id="A1_result"></span></div>
  <div class="line">A2ライン: <input type="number" id="A2"> → <span id="A2_result"></span></div>
  <div class="line">Bライン: <input type="number" id="B"> → <span id="B_result"></span></div>
  <div class="line">Cライン: <input type="number" id="C"> → <span id="C_result"></span></div>
  <div class="line">Dライン: <input type="number" id="D"> → <span id="D_result"></span></div>
  <div class="line">Eライン: <input type="number" id="E"> → <span id="E_result"></span></div>
  <div class="line">Fライン: <input type="number" id="F"> → <span id="F_result"></span></div>

  <div class="result-box">
    <div class="line">B + D 合計脚数: <span id="BD_double"></span></div>
    <div class="line">A1 + A2 + E 合計脚数: <span id="A12E_result"></span></div>
  </div>

  <!-- 追加したチェックボックス -->
  <div class="check-section">
    <label class="check-line"><input type="checkbox" id="check_kyakusuu"> 客数入力済み</label>
    <label class="check-line"><input type="checkbox" id="check_hoist"> ホイストチェック</label>
    <label class="check-line"><input type="checkbox" id="check_card"> 良品カードチェック</label>
  </div>

  <script type="module">
    // 1. Firebase SDK (正確なフルURLに修正済み)

    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

    // 2. Firebase設定 (Database URLを修正済み)
    const firebaseConfig = {
      apiKey: "AIzaSyBdyEwQBM_fNIeJ2plVFBFPkzxFCjfSiYE",
      authDomain: "://firebaseapp.com",
      projectId: "kyakusuu-app",
      storageBucket: "kyakusuu-app.firebasestorage.app",
      messagingSenderId: "266817532836",
      appId: "1:266817532836:web:3864087131a7675dbf8731",
      measurementId: "G-391KFG9YFR",
      databaseURL: "https://kyakusuu-app-default-rtdb.asia-southeast1.firebasedatabase.app/" 
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dataRef = ref(db, 'shared_counts');
    
    const inputIds = ['A1', 'A2', 'B', 'C', 'D', 'E', 'F'];
    const checkIds = ['check_kyakusuu', 'check_hoist', 'check_card'];

    function calculate() {
      ['A1','A2','B','C','D','F'].forEach(id => {
        const val = document.getElementById(id).value;
        document.getElementById(id + '_result').textContent = val ? val * 2 : '';
      });
      const eVal = document.getElementById('E').value;
      document.getElementById('E_result').textContent = eVal ? eVal : '';

      const b = Number(document.getElementById('B').value) || 0;
      const d = Number(document.getElementById('D').value) || 0;
      document.getElementById('BD_double').textContent = (b + d) * 2;

      const a1 = Number(document.getElementById('A1').value) || 0;
      const a2 = Number(document.getElementById('A2').value) || 0;
      const e  = Number(document.getElementById('E').value) || 0;
      document.getElementById('A12E_result').textContent = (a1 * 2) + (a2 * 2) + e;
    }

    function saveData() {
      const vals = { updatedAt: Date.now() };
      inputIds.forEach(id => { vals[id] = document.getElementById(id).value; });
      checkIds.forEach(id => { vals[id] = document.getElementById(id).checked; }); // チェック状態保存

      set(dataRef, vals).then(() => {
        document.getElementById('status').textContent = "クラウド同期済み ✅";
      }).catch((error) => {
        document.getElementById('status').textContent = "同期エラー: " + error.message;
      });
    }

    onValue(dataRef, (snapshot) => {
      const data = snapshot.val();
      if (!data) return;

      // 4時間経過チェック (4 * 60 * 60 * 1000 ms)
      const limit = 4 * 60 * 60 * 1000;
      if (data.updatedAt && (Date.now() - data.updatedAt > limit)) {
        inputIds.forEach(id => document.getElementById(id).value = "");
        checkIds.forEach(id => document.getElementById(id).checked = false);
        calculate();
        document.getElementById('status').textContent = "4時間経過したためリセットされました";
        return;
      }

      inputIds.forEach(id => {
        if (document.activeElement.id !== id) {
          document.getElementById(id).value = data[id] || "";
        }
      });
      checkIds.forEach(id => {
        document.getElementById(id).checked = data[id] || false;
      });
      
      calculate(); 
      document.getElementById('status').textContent = "最新データを取得しました";
    });

    // 入力やチェックが変更されたら即保存
    [...inputIds, ...checkIds].forEach(id => {
      document.getElementById(id).addEventListener('change', () => { calculate(); saveData(); });
      if(inputIds.includes(id)) {
        document.getElementById(id).addEventListener('input', () => { calculate(); saveData(); });
      }
    });
  </script>
</body>
</html>
