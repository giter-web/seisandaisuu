<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>脚数計算 - リアルタイム共有</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#88c9bf">
  <link rel="icon" href="icon.png">

  <style>
    body { font-family: sans-serif; padding: 20px; background: #f0f8f5; color: #333; }
    h2 { color: #555; }
    .status-bar { font-size: 12px; color: #88c9bf; margin-bottom: 15px; font-weight: bold; }
    .line { margin-bottom: 15px; }
    input { width: 100px; padding: 5px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
    span { margin-left: 10px; font-weight: bold; color: #444; }
    .result-box { margin-top: 20px; padding: 15px; background: white; border-radius: 10px; border: 1px solid #88c9bf; }
    button { padding: 12px 24px; background: #88c9bf; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    button:active { background: #6da39a; }
  </style>
</head>
<body>

  <h2>🌱 脚数計算 (共有中)</h2>
  <div id="status" class="status-bar">クラウド同期：接続中...</div>

  <div class="line">A1ライン: <input type="number" id="A1"> → <span id="A1_result"></span></div>
  <div class="line">A2ライン: <input type="number" id="A2"> → <span id="A2_result"></span></div>
  <div class="line">Bライン: <input type="number" id="B"> → <span id="B_result"></span></div>
  <div class="line">Cライン: <input type="number" id="C"> → <span id="C_result"></span></div>
  <div class="line">Dライン: <input type="number" id="D"> → <span id="D_result"></span></div>
  <div class="line">Eライン: <input type="number" id="E"> → <span id="E_result"></span></div>
  <div class="line">Fライン: <input type="number" id="F"> → <span id="F_result"></span></div>

  <div class="result-box">
    <div class="line">B + D 合計脚数: <span id="BD_double"></span></div>
    <div class="line">A1 + A2 + E 合計脚数: <span id="A12E_result"></span></div>
  </div>

  <!-- ★ 計算ボタンを復活 -->
  <button id="calcBtn">計算して共有</button>

  <script type="module">
    import { initializeApp } from "https://gstatic.com";
    import { getDatabase, ref, set, onValue } from "https://gstatic.com";

    const firebaseConfig = {
      apiKey: "AIzaSyBdyEwQBM_fNIeJ2plVFBFPkzxFCjfSiYE",
      authDomain: "://firebaseapp.com",
      projectId: "kyakusuu-app",
      storageBucket: "kyakusuu-app.firebasestorage.app",
      messagingSenderId: "266817532836",
      appId: "1:266817532836:web:3864087131a7675dbf8731",
      measurementId: "G-391KFG9YFR",
      databaseURL: "https://firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dataRef = ref(db, 'shared_counts');
    const inputIds = ['A1','A2','B','C','D','E','F'];

    // --- 保存関数 (Firebaseへ送信) ---
    function saveData() {
      const vals = {};
      inputIds.forEach(id => {
        vals[id] = document.getElementById(id).value;
      });
      set(dataRef, vals);
      document.getElementById('status').textContent = "クラウドに同期しました ✅";
    }

    // --- 計算表示関数 ---
    function calculate() {
      const getVal = (id) => Number(document.getElementById(id).value) || 0;

      ['A1','A2','B','C','D','F'].forEach(id => {
        const val = getVal(id);
        document.getElementById(id + '_result').textContent = val ? val * 2 : '';
      });

      const eVal = document.getElementById('E').value;
      document.getElementById('E_result').textContent = eVal || '';

      const b = getVal('B'), d = getVal('D'), a1 = getVal('A1'), a2 = getVal('A2'), e = getVal('E');
      document.getElementById('BD_double').textContent = (b + d) * 2;
      document.getElementById('A12E_result').textContent = (a1 * 2) + (a2 * 2) + e;
    }

    // 1. Firebaseからデータを受信
    onValue(dataRef, (snapshot) => {
      const data = snapshot.val();
      if (!data) return;
      inputIds.forEach(id => {
        if (document.activeElement.id !== id) {
          document.getElementById(id).value = data[id] || "";
        }
      });
      calculate();
    });

    // 2. ボタンクリックで保存＆計算
    document.getElementById('calcBtn').addEventListener('click', () => {
      saveData();
      calculate();
    });

    // 3. 入力されるたびに自動保存 (お好みで残しています)
    inputIds.forEach(id => {
      document.getElementById(id).addEventListener('input', saveData);
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./service-worker.js');
    }
  </script>
</body>
</html>
